<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> إدارة المنيو - تل السنديان </title>
    <link rel="icon" href="https://iili.io/qfhk5Pt.png">
    <link rel="apple-touch-icon" href="https://iili.io/qfhk5Pt.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ==================== الأساسيات ==================== */
        :root {
            --forest-green-light: #3f8b3a;
            --forest-green-bright: #5cb85c;
            --olive-green-bright: #8bc34a;
            --sandy-beige: #F5E6D3;
            --pure-white: #FFFFFF;
            --off-white: #F8F9FA;
            --text-dark: #1e3b1a;
            --shadow-soft: rgba(60, 120, 50, 0.35);
            --shadow-intense: rgba(45, 90, 39, 0.8);
            --gradient-forest-luxury: linear-gradient(145deg, #2b5e25, #4e8d42, #7fb073);
            --forest-green: #2D5A27;
            --olive-green: #4A7B3D;
            --clay-brown: #8B5A2B;
            --cream-white: #FFF9F0;
            --text-dark: #2C3E2F;
            --profit-color: #27ae60;
            --loss-color: #c0392b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 10% 20%, #386f2e, #1f4a18);
            color: var(--text-dark);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        #animated-forest-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #1e4a1a, #3d7534, #68a355); z-index: -2;
        }

        .falling-leaves {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }

        .leaf {
            position: absolute; top: -10%; color: rgba(255,255,240,0.9);
            font-size: 1.8rem; animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0.2; }
        }

        .glowing-logo {
            border-radius: 50%; border: 5px solid var(--sandy-beige);
            box-shadow: 0 0 30px var(--forest-green);
            width: 120px; height: 120px; display: block; margin: 0 auto 20px;
        }

        .login-screen {
            background: rgba(255,249,240,0.95);
            border-radius: 40px; padding: 30px 20px;
            width: 100%; max-width: 400px;
            border: 4px solid var(--clay-brown);
            box-shadow: 0 20px 50px var(--shadow-intense);
            text-align: center; z-index: 1;
        }

        .input-field {
            width: 100%; padding: 14px 20px; border: 2px solid var(--sandy-beige);
            border-radius: 30px; font-family: 'Cairo', sans-serif; margin: 10px 0; background: white;
        }
        .input-field:focus { outline: none; border-color: var(--forest-green); }

        .login-submit, .sync-btn, .submit-form-btn, .action-btn {
            background: var(--gradient-forest-luxury); color: white; border: none;
            padding: 15px 25px; border-radius: 40px; font-weight: 900; font-size: 1.1em;
            cursor: pointer; margin-top: 10px; border: 2px solid var(--sandy-beige);
            transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-submit:hover, .sync-btn:hover, .submit-form-btn:hover, .action-btn:hover {
            transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .action-btn.small { padding: 8px 15px; font-size: 0.9em; margin-top: 0; }

        .app-container {
            display: none; width: 100%; max-width: 1400px;
            background: rgba(255,249,240,0.95); border-radius: 30px;
            border: 4px solid var(--clay-brown); box-shadow: 0 20px 50px var(--shadow-intense);
            overflow: hidden; flex-direction: column; margin-top: 20px; z-index: 1;
        }
        .app-container.active { display: flex; }

        .app-header {
            background: var(--forest-green); color: white; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--sandy-beige);
        }
        .app-title { font-size: 1.2em; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        .logout-btn {
            background: rgba(255,255,255,0.2); border: 2px solid var(--sandy-beige);
            color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 0.9em;
        }
        .logout-btn:hover { background: white; color: var(--forest-green); }

        .tabs-container {
            display: flex; gap: 8px; padding: 15px; background: var(--sandy-beige);
            border-bottom: 2px solid var(--clay-brown); overflow-x: auto;
            white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 0 0 auto; background: var(--cream-white); border: 2px solid var(--forest-green);
            padding: 12px 20px; border-radius: 40px; font-weight: 700; font-size: 0.95em;
            color: var(--forest-green); cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 5px; transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--forest-green); color: white; border-color: var(--sandy-beige);
            transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45,90,39,0.5);
        }

        .content-area { padding: 20px; max-height: 70vh; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px;
            border: 2px solid var(--clay-brown); box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .item-info h3 { color: var(--forest-green); }
        .item-price { color: var(--clay-brown); font-weight: 900; }
        .item-cost { color: #7f8c8d; font-size: 0.9em; }
        .item-actions { display: flex; gap: 8px; }
        .item-actions button { background: none; border: none; font-size: 1.2em; cursor: pointer; padding: 5px; }
        .edit-btn { color: #007bff; }
        .delete-btn { color: #dc3545; }

        /* Sales Section - REVERTED TO ORIGINAL */
        .sales-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .sales-filter-row {
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.5); padding: 10px 15px; border-radius: 50px; border: 2px solid var(--clay-brown);
        }
        .filter-select {
            padding: 8px 15px; border: 2px solid var(--clay-brown); border-radius: 30px;
            font-family: 'Cairo', sans-serif; background: white; min-width: 150px;
        }
        .date-picker { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .date-picker label { font-weight: 700; color: var(--forest-green); }
        .date-input {
            padding: 8px 12px; border: 2px solid var(--sandy-beige); border-radius: 30px;
            font-family: 'Cairo', sans-serif; background: white;
        }
        .date-preset-buttons { display: flex; gap: 5px; flex-wrap: wrap; margin-right: auto; }
        .date-preset-btn {
            background: var(--cream-white); border: 2px solid var(--forest-green);
            padding: 5px 15px; border-radius: 30px; cursor: pointer; font-weight: 700; font-size: 0.9em;
        }
        .date-preset-btn:hover { background: var(--forest-green); color: white; }
        .apply-filter-btn {
            background: var(--forest-green); color: white; border: 2px solid var(--sandy-beige);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .refresh-sales-btn {
            background: var(--forest-green); color: white; border: 2px solid var(--sandy-beige);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 700;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .orders-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 15px;
        }
        .order-card { background: white; border-radius: 20px; border: 2px solid var(--clay-brown); overflow: hidden; }
        .order-header { background: var(--forest-green); color: white; padding: 12px 15px; display: flex; justify-content: space-between; }
        .order-body { padding: 15px; }
        .order-items-list {
            background: rgba(245,230,211,0.3); border-radius: 15px; padding: 10px; margin: 10px 0;
            max-height: 150px; overflow-y: auto;
        }
        .order-item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed rgba(45,90,39,0.2); }
        .order-total { font-weight: 900; color: var(--forest-green); text-align: left; margin-top: 10px; }
        .order-status {
            display: inline-block; padding: 5px 15px; border-radius: 30px; font-size: 0.9em; font-weight: 700; margin-top: 10px;
        }
        .status-preparing { background: rgba(74,123,61,0.2); color: var(--forest-green); border: 1px solid var(--forest-green); }
        .status-completed { background: rgba(139,90,43,0.2); color: var(--clay-brown); border: 1px solid var(--clay-brown); }

        /* Reports Section */
        .reports-header { margin-bottom: 25px; }
        .date-range-picker {
            display: flex; gap: 15px; flex-wrap: wrap; align-items: center;
            background: rgba(255,255,255,0.7); padding: 15px; border-radius: 40px; border: 2px solid var(--clay-brown);
        }
        .preset-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .preset-btn {
            background: var(--cream-white); border: 2px solid var(--forest-green);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 700;
        }
        .preset-btn.active { background: var(--forest-green); color: white; }
        .stats-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin: 25px 0;
        }
        .stat-card {
            background: white; border-radius: 30px; padding: 20px; border: 2px solid var(--clay-brown); text-align: center;
        }
        .stat-icon { font-size: 2.5em; color: var(--forest-green); }
        .stat-value { font-size: 2.2em; font-weight: 900; color: var(--forest-green); }
        .stat-label { font-size: 0.9em; color: #555; margin-top: 5px; }
        .stat-card.profit-card .stat-value { color: var(--profit-color); }
        .stat-card.profit-card .stat-icon { color: var(--profit-color); }
        .chart-container {
            background: white; border-radius: 30px; padding: 20px; border: 2px solid var(--clay-brown);
            margin-bottom: 25px; height: 300px;
        }
        .top-products-table {
            background: white; border-radius: 30px; padding: 20px; border: 2px solid var(--clay-brown); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--sandy-beige); color: var(--forest-green); padding: 12px; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--sandy-beige); text-align: center; }
        .profit-val { font-weight: bold; color: var(--profit-color); }
        .loss-val { font-weight: bold; color: var(--loss-color); }

        /* Inventory Section */
        .inventory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .inventory-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .inventory-table-container {
            background: white; border-radius: 30px; padding: 20px; border: 2px solid var(--clay-brown); overflow-x: auto;
        }
        .inventory-table { width: 100%; min-width: 1000px; }
        .qty-input { width: 80px; padding: 5px; border: 2px solid var(--sandy-beige); border-radius: 20px; text-align: center; }
        .diff-positive { color: var(--forest-green); font-weight: 900; }
        .diff-negative { color: #b33; font-weight: 900; }
        .empty-state { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; border: 2px solid var(--clay-brown); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none;
            justify-content: center; align-items: center; z-index: 2000; padding: 15px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--cream-white); border-radius: 30px; padding: 20px;
            width: 100%; max-width: 500px; border: 4px solid var(--clay-brown); max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--forest-green); }
        .modal-close { font-size: 2em; cursor: pointer; color: var(--clay-brown); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 700; color: var(--forest-green); margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid var(--sandy-beige); border-radius: 20px; font-family: 'Cairo', sans-serif;
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--forest-green); color: white; padding: 12px 25px; border-radius: 40px;
            z-index: 3000; border: 2px solid var(--sandy-beige); font-weight: bold; max-width: 300px; text-align: center;
        }
        @media (max-width: 600px) {
            .sales-filter-row { flex-direction: column; align-items: stretch; }
            .date-picker { justify-content: space-between; }
            .date-preset-buttons { margin-right: 0; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="animated-forest-bg"></div>
    <div class="falling-leaves" id="fallingLeaves"></div>

    <!-- شاشة الدخول -->
    <div class="login-screen" id="loginScreen">
        <img src="https://iili.io/qfhk5Pt.png" alt="تل السنديان" class="glowing-logo">
        <h2 style="color: var(--forest-green); margin-bottom: 15px;">لوحة تحكم تل السنديان</h2>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم" value="Mismar">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور" value="Mismar.11">
        <button class="login-submit" onclick="App.attemptLogin()">دخول</button>
        <div id="errorMsg" style="color: red; margin-top: 10px; display: none;">بيانات غير صحيحة</div>
    </div>

    <!-- بعد تسجيل الدخول -->
    <div style="display: none; flex-direction: column; align-items: center; width: 100%;" id="postLoginWrapper">
        <img src="https://iili.io/qfhk5Pt.png" alt="تل السنديان" class="glowing-logo">
        <div class="app-container" id="appContainer">
            <div class="app-header">
                <div class="app-title">إدارة المنيو والمبيعات والمخزون</div>
                <div style="display: flex; gap: 10px;">
                    <button class="logout-btn" onclick="App.refreshAllData()" title="تحديث الكل"><i class="fas fa-sync-alt"></i></button>
                    <button class="logout-btn" onclick="App.logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="App.switchTab('categories')"><i class="fas fa-list"></i> الأصناف</button>
                <button class="tab-btn" onclick="App.switchTab('products')"><i class="fas fa-utensils"></i> المنتجات</button>
                <button class="tab-btn" onclick="App.switchTab('sales')"><i class="fas fa-chart-line"></i> المبيعات</button>
                <button class="tab-btn" onclick="App.switchTab('reports')"><i class="fas fa-file-invoice-dollar"></i> الأرباح والتقارير</button>
                <button class="tab-btn" onclick="App.switchTab('inventory')"><i class="fas fa-boxes"></i> المخزون</button>
            </div>

            <div class="content-area" id="contentArea">
                <!-- يتم تعبئة المحتوى عبر JavaScript -->
            </div>
        </div>
    </div>

    <!-- مودال تسوية المخزون -->
    <div class="modal-overlay" id="inventoryModal">
        <div class="modal-content">
            <div class="modal-header"><h2>تسوية المخزون</h2><span class="modal-close" onclick="App.UI.closeInventoryModal()">&times;</span></div>
            <div id="inventoryForm">
                <p>أدخل الكميات الفعلية للمنتجات</p>
                <div style="max-height: 300px; overflow-y: auto; margin: 15px 0;">
                    <table style="width:100%;">
                        <thead><tr><th>المنتج</th><th>الكمية الفعلية</th></tr></thead>
                        <tbody id="inventoryCountTable"></tbody>
                    </table>
                </div>
                <button class="submit-form-btn" onclick="App.Inventory.submitCount()">حفظ التسوية</button>
            </div>
        </div>
    </div>

    <!-- مودال عام -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">إضافة</h2><span class="modal-close" onclick="App.UI.closeModal()">&times;</span></div>
            <form id="editForm"></form>
        </div>
    </div>

    <script>
        // ============================================================
        // النظام المتكامل لإدارة تل السنديان - نسخة محسنة بشكل جذري
        // مع CSS الأصلي
        // ============================================================

        (function() {
            // ---------- البيئة والإعدادات ----------
            const CONFIG = {
                SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzTCkWGX2AqZVL70j38XbfphD_4-jHZx71ro-N77b39vBY7u5pftZ0hXtbVRZ0kDNAr/exec',
                KITCHEN_API_URL: 'https://script.google.com/macros/s/AKfycbzU7pp0Ul8KNDT4iEd7kGFxNrXYzX4B4zfdYANjE59ABvMq1vIKlmEM4gAOipY47Zeoiw/exec',
                CREDENTIALS: { user: 'Mismar', pass: 'Mismar.11' },
                STORAGE_KEYS: {
                    INVENTORY: 'tel_alsindian_inventory',
                    ORDERS_CACHE: 'tel_alsindian_orders_cache',
                    ORDERS_TIMESTAMP: 'tel_alsindian_orders_timestamp',
                    MENU_CACHE: 'tel_alsindian_menu_cache'
                },
                MAX_RETRIES: 3,
                RETRY_DELAY: 1000,
                REQUEST_TIMEOUT: 10000
            };

            // ---------- حالة التطبيق العامة ----------
            const AppState = {
                user: null,
                isAuthenticated: false,
                categories: [],
                products: [],
                allOrders: [],
                inventoryData: [],
                currentTab: 'categories',
                salesChart: null,
                isLoading: false,
                pendingRequests: 0,
                offlineQueue: []  // للأعمال التي فشلت بسبب الاتصال
            };

            // ---------- دوال مساعدة عامة ----------
            const Utils = {
                generateId: () => 'id_' + Date.now() + Math.random().toString(36).substr(2, 6),

                showToast: (msg, isError = false, duration = 3000) => {
                    const toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.style.backgroundColor = isError ? '#c0392b' : 'var(--forest-green)';
                    toast.innerText = msg;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), duration);
                },

                showLoading: (show) => {
                    AppState.isLoading = show;
                    // يمكن إضافة مؤشر تحميل عام
                },

                formatDate: (date) => {
                    const d = new Date(date);
                    return d.toLocaleDateString('ar-EG') + ' ' + d.toLocaleTimeString('ar-EG');
                },

                safeJSONParse: (str, fallback = null) => {
                    try { return JSON.parse(str); } catch { return fallback; }
                },

                // طلب HTTP مع إعادة محاولة ومهلة
                async fetchWithRetry(url, options = {}, retries = CONFIG.MAX_RETRIES) {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
                    try {
                        AppState.pendingRequests++;
                        const response = await fetch(url, { ...options, signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                        return await response.json();
                    } catch (error) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, CONFIG.RETRY_DELAY));
                            return this.fetchWithRetry(url, options, retries - 1);
                        }
                        throw error;
                    } finally {
                        AppState.pendingRequests--;
                    }
                },

                // حفظ البيانات في التخزين المحلي مع تشفير بسيط (base64)
                setSecureItem: (key, value) => {
                    try {
                        const encoded = btoa(JSON.stringify(value));
                        localStorage.setItem(key, encoded);
                    } catch (e) {
                        console.error('فشل في حفظ البيانات:', e);
                    }
                },

                getSecureItem: (key) => {
                    try {
                        const item = localStorage.getItem(key);
                        if (!item) return null;
                        return JSON.parse(atob(item));
                    } catch {
                        return null;
                    }
                },

                // إضافة عملية إلى قائمة الانتظار عند عدم الاتصال
                addToQueue: (action, data) => {
                    AppState.offlineQueue.push({ action, data, timestamp: Date.now() });
                    Utils.showToast('تم حفظ العملية محلياً وستنفذ عند استعادة الاتصال');
                },

                // محاولة تنفيذ العمليات المعلقة
                async processOfflineQueue() {
                    if (AppState.offlineQueue.length === 0) return;
                    Utils.showToast('جاري مزامنة العمليات المحلية...');
                    for (const item of AppState.offlineQueue) {
                        try {
                            if (item.action === 'saveCategory' || item.action === 'saveProduct' || item.action === 'deleteItem') {
                                await API.saveToServer(item.data.type, item.data.data);
                            }
                            // يمكن إضافة المزيد من الإجراءات
                        } catch (e) {
                            console.error('فشل تنفيذ عملية مؤجلة:', e);
                        }
                    }
                    AppState.offlineQueue = [];
                    Utils.showToast('تمت المزامنة بنجاح');
                }
            };

            // ---------- التعامل مع API ----------
            const API = {
                async fetchMenu() {
                    try {
                        const data = await Utils.fetchWithRetry(`${CONFIG.SCRIPT_URL}?action=getMenuData&_=${Date.now()}`);
                        if (data.success) {
                            AppState.categories = data.categories || [];
                            AppState.products = (data.products || []).map(p => ({ ...p, cost: p.cost || 0 }));
                            // تحديث الكاش
                            Utils.setSecureItem(CONFIG.STORAGE_KEYS.MENU_CACHE, { categories: AppState.categories, products: AppState.products });
                            return true;
                        }
                        throw new Error('استجابة غير صالحة');
                    } catch (error) {
                        Utils.showToast('فشل تحميل المنيو، استخدام البيانات المخزنة', true);
                        const cached = Utils.getSecureItem(CONFIG.STORAGE_KEYS.MENU_CACHE);
                        if (cached) {
                            AppState.categories = cached.categories || [];
                            AppState.products = cached.products || [];
                        }
                        return false;
                    }
                },

                async saveToServer(type, data) {
                    // type: 'categories' أو 'products'
                    const action = type === 'categories' ? 'saveCategories' : 'saveProducts';
                    const formData = new URLSearchParams();
                    formData.append('action', action);
                    formData.append('data', JSON.stringify(data));

                    try {
                        const result = await Utils.fetchWithRetry(CONFIG.SCRIPT_URL, {
                            method: 'POST',
                            body: formData
                        });
                        if (result.success) {
                            Utils.showToast('تم الحفظ بنجاح');
                            // تحديث الكاش
                            const cache = Utils.getSecureItem(CONFIG.STORAGE_KEYS.MENU_CACHE) || {};
                            cache[type] = data;
                            Utils.setSecureItem(CONFIG.STORAGE_KEYS.MENU_CACHE, cache);
                            return true;
                        } else {
                            throw new Error(result.error || 'خطأ في الحفظ');
                        }
                    } catch (error) {
                        Utils.showToast('فشل الحفظ على السيرفر، تم حفظه محلياً', true);
                        // إضافة إلى قائمة الانتظار
                        Utils.addToQueue('save', { type, data });
                        return false;
                    }
                },

                async loadOrders(forceRefresh = false) {
                    if (!forceRefresh) {
                        const cached = Utils.getSecureItem(CONFIG.STORAGE_KEYS.ORDERS_CACHE);
                        if (cached) {
                            AppState.allOrders = cached;
                            return;
                        }
                    }
                    try {
                        const data = await Utils.fetchWithRetry(`${CONFIG.KITCHEN_API_URL}?action=getOrders&status=all&_=${Date.now()}`);
                        if (data.success && data.orders) {
                            AppState.allOrders = data.orders.map(order => ({
                                orderId: order.orderId || order.id || 'غير معروف',
                                timestamp: order.timestamp || order.date || order.time || new Date().toISOString(),
                                tableNumber: order.tableNumber || order.table || '?',
                                notes: order.notes || '',
                                total: Number(order.total) || 0,
                                items: Array.isArray(order.items) ? order.items.map(item => {
                                    const product = AppState.products.find(p => p.name === item.name);
                                    return {
                                        productId: product ? product.id : null,
                                        name: item.name || 'منتج',
                                        quantity: Number(item.quantity) || 1,
                                        price: Number(item.price) || 0
                                    };
                                }) : [],
                                status: order.status || 'preparing'
                            }));
                            Utils.setSecureItem(CONFIG.STORAGE_KEYS.ORDERS_CACHE, AppState.allOrders);
                            localStorage.setItem(CONFIG.STORAGE_KEYS.ORDERS_TIMESTAMP, new Date().toISOString());
                        } else {
                            throw new Error('بيانات الطلبات غير صحيحة');
                        }
                    } catch (error) {
                        Utils.showToast('تعذر تحميل الطلبات، استخدام المحفوظة', true);
                        const cached = Utils.getSecureItem(CONFIG.STORAGE_KEYS.ORDERS_CACHE);
                        if (cached) AppState.allOrders = cached;
                    }
                }
            };

            // ---------- إدارة المخزون ----------
            const InventoryManager = {
                load() {
                    const stored = Utils.getSecureItem(CONFIG.STORAGE_KEYS.INVENTORY);
                    if (stored) {
                        AppState.inventoryData = stored;
                    } else {
                        AppState.inventoryData = AppState.products.map(p => ({
                            productId: p.id,
                            openingStock: 0,
                            actualStock: 0,
                            lastCountDate: null
                        }));
                    }
                    this.mergeWithProducts();
                },

                save() {
                    Utils.setSecureItem(CONFIG.STORAGE_KEYS.INVENTORY, AppState.inventoryData);
                },

                mergeWithProducts() {
                    const existingIds = new Set(AppState.inventoryData.map(i => i.productId));
                    const newItems = AppState.products.filter(p => !existingIds.has(p.id)).map(p => ({
                        productId: p.id,
                        openingStock: 0,
                        actualStock: 0,
                        lastCountDate: null
                    }));
                    if (newItems.length > 0) {
                        AppState.inventoryData.push(...newItems);
                        this.save();
                    }
                },

                calculateSold() {
                    const completedOrders = AppState.allOrders.filter(o => o.status === 'completed');
                    const totalSoldMap = new Map();
                    const todaySoldMap = new Map();
                    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
                    completedOrders.forEach(order => {
                        (order.items || []).forEach(item => {
                            if (item.productId) {
                                const qty = item.quantity || 0;
                                totalSoldMap.set(item.productId, (totalSoldMap.get(item.productId) || 0) + qty);
                                const orderDate = new Date(order.timestamp);
                                if (orderDate >= todayStart) {
                                    todaySoldMap.set(item.productId, (todaySoldMap.get(item.productId) || 0) + qty);
                                }
                            }
                        });
                    });
                    return { totalSoldMap, todaySoldMap };
                },

                renderTable() {
                    const tbody = document.getElementById('inventoryTableBody');
                    if (!tbody) return;
                    if (!AppState.products.length) {
                        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">لا توجد منتجات</td></tr>';
                        return;
                    }
                    const { totalSoldMap, todaySoldMap } = this.calculateSold();
                    tbody.innerHTML = AppState.products.map(product => {
                        const inv = AppState.inventoryData.find(i => i.productId === product.id) || { openingStock: 0, actualStock: 0, lastCountDate: null };
                        const totalSold = totalSoldMap.get(product.id) || 0;
                        const todaySold = todaySoldMap.get(product.id) || 0;
                        const theoretical = (inv.openingStock || 0) - totalSold;
                        const actual = inv.actualStock || 0;
                        const diff = theoretical - actual;
                        const diffClass = diff > 0 ? 'diff-positive' : (diff < 0 ? 'diff-negative' : '');
                        const lastCount = inv.lastCountDate ? new Date(inv.lastCountDate).toLocaleDateString('ar-EG') : 'لم يسجل';
                        return `<tr>
                            <td>${product.name}</td>
                            <td>${todaySold}</td>
                            <td>${totalSold}</td>
                            <td>${theoretical}</td>
                            <td>${actual}</td>
                            <td class="${diffClass}">${diff > 0 ? '+' : ''}${diff}</td>
                            <td>${lastCount}</td>
                        </tr>`;
                    }).join('');
                },

                openCountModal() {
                    const tbody = document.getElementById('inventoryCountTable');
                    if (!tbody) return;
                    tbody.innerHTML = AppState.products.map(product => {
                        const inv = AppState.inventoryData.find(i => i.productId === product.id) || { actualStock: 0 };
                        return `<tr>
                            <td>${product.name}</td>
                            <td><input type="number" min="0" step="1" value="${inv.actualStock}" class="qty-input" id="count-${product.id}"></td>
                        </tr>`;
                    }).join('');
                    document.getElementById('inventoryModal').classList.add('active');
                },

                submitCount() {
                    const inputs = document.querySelectorAll('#inventoryCountTable input');
                    inputs.forEach(input => {
                        const productId = input.id.replace('count-', '');
                        const qty = parseInt(input.value) || 0;
                        let inv = AppState.inventoryData.find(i => i.productId === productId);
                        if (!inv) {
                            inv = { productId, openingStock: 0, actualStock: qty, lastCountDate: new Date().toISOString() };
                            AppState.inventoryData.push(inv);
                        } else {
                            inv.actualStock = qty;
                            inv.lastCountDate = new Date().toISOString();
                        }
                    });
                    this.save();
                    this.renderTable();
                    document.getElementById('inventoryModal').classList.remove('active');
                    Utils.showToast('تم تحديث المخزون الفعلي');
                },

                resetOpeningStock() {
                    if (!confirm('إعادة تعيين المخزون الافتتاحي للصفر؟')) return;
                    AppState.inventoryData.forEach(i => i.openingStock = 0);
                    this.save();
                    this.renderTable();
                    Utils.showToast('تم إعادة التعيين');
                },

                resetFull() {
                    if (!confirm('سيتم تصفير المخزون والمبيعات بشكل دائم. هل أنت متأكد؟')) return;
                    AppState.allOrders = AppState.allOrders.filter(o => o.status !== 'completed');
                    AppState.inventoryData.forEach(i => {
                        i.openingStock = 0;
                        i.actualStock = 0;
                        i.lastCountDate = new Date().toISOString();
                    });
                    this.save();
                    Utils.setSecureItem(CONFIG.STORAGE_KEYS.ORDERS_CACHE, AppState.allOrders);
                    this.renderTable();
                    if (typeof SalesManager !== 'undefined') SalesManager.applyFilter();
                    Utils.showToast('تم التصفير');
                },

                exportData() {
                    const dataStr = JSON.stringify(AppState.inventoryData, null, 2);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `inventory_${new Date().toISOString().split('T')[0]}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                },

                importData() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.onchange = e => {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = event => {
                            try {
                                const data = Utils.safeJSONParse(event.target.result, []);
                                if (Array.isArray(data)) {
                                    AppState.inventoryData = data;
                                    this.mergeWithProducts();
                                    this.save();
                                    this.renderTable();
                                    Utils.showToast('تم الاستيراد بنجاح');
                                } else {
                                    Utils.showToast('ملف غير صالح', true);
                                }
                            } catch (ex) {
                                Utils.showToast('خطأ في قراءة الملف', true);
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                }
            };

            // ---------- إدارة المبيعات والتصفية ----------
            const SalesManager = {
                filterStatus: 'all',
                dateFrom: null,
                dateTo: null,

                initDates() {
                    const today = new Date();
                    const sevenDaysAgo = new Date(today);
                    sevenDaysAgo.setDate(today.getDate() - 7);
                    document.getElementById('salesDateFrom').value = sevenDaysAgo.toISOString().split('T')[0];
                    document.getElementById('salesDateTo').value = today.toISOString().split('T')[0];
                },

                applyFilter() {
                    const fromStr = document.getElementById('salesDateFrom').value;
                    const toStr = document.getElementById('salesDateTo').value;
                    this.dateFrom = fromStr ? new Date(fromStr) : null;
                    this.dateTo = toStr ? new Date(toStr) : null;
                    if (this.dateTo) this.dateTo.setHours(23,59,59,999);
                    this.render();
                },

                setPreset(preset) {
                    const today = new Date();
                    let from, to;
                    switch (preset) {
                        case 'today':
                            from = new Date(today.setHours(0,0,0,0));
                            to = new Date(today.setHours(23,59,59,999));
                            break;
                        case 'yesterday':
                            const y = new Date(today);
                            y.setDate(y.getDate()-1);
                            from = new Date(y.setHours(0,0,0,0));
                            to = new Date(y.setHours(23,59,59,999));
                            break;
                        case 'week':
                            const fd = new Date(today);
                            fd.setDate(today.getDate() - today.getDay() + (today.getDay()===0?-6:1));
                            from = new Date(fd.setHours(0,0,0,0));
                            to = new Date(new Date().setHours(23,59,59,999));
                            break;
                        case 'month':
                            from = new Date(today.getFullYear(), today.getMonth(), 1, 0,0,0);
                            to = new Date(today.getFullYear(), today.getMonth()+1, 0, 23,59,59);
                            break;
                        case 'all':
                            from = null; to = null; break;
                    }
                    if (from) {
                        document.getElementById('salesDateFrom').value = from.toISOString().split('T')[0];
                        document.getElementById('salesDateTo').value = to.toISOString().split('T')[0];
                    } else {
                        document.getElementById('salesDateFrom').value = '';
                        document.getElementById('salesDateTo').value = '';
                    }
                    this.applyFilter();
                },

                render() {
                    const container = document.getElementById('salesList');
                    if (!container) return;
                    let filtered = AppState.allOrders;
                    const status = document.getElementById('salesStatusFilter').value;
                    if (status !== 'all') filtered = filtered.filter(o => o.status === status);
                    if (this.dateFrom) filtered = filtered.filter(o => new Date(o.timestamp) >= this.dateFrom);
                    if (this.dateTo) filtered = filtered.filter(o => new Date(o.timestamp) <= this.dateTo);
                    filtered.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

                    if (filtered.length === 0) {
                        container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><h3>لا توجد طلبات</h3></div>`;
                        return;
                    }
                    container.innerHTML = filtered.map(order => {
                        const items = order.items || [];
                        const timeStr = Utils.formatDate(order.timestamp);
                        const total = order.total.toFixed(2);
                        return `<div class="order-card">
                            <div class="order-header"><span>${order.orderId}</span><span>${timeStr}</span></div>
                            <div class="order-body">
                                <div><i class="fas fa-chair"></i> طاولة: ${order.tableNumber}</div>
                                <div class="order-items-list">${items.map(item => `<div class="order-item-row"><span>${item.name}</span><span>x${item.quantity} (${(item.price*item.quantity).toFixed(2)} د.أ)</span></div>`).join('')}</div>
                                <div class="order-total">الإجمالي: ${total} د.أ</div>
                                <span class="order-status ${order.status === 'preparing' ? 'status-preparing' : 'status-completed'}"><i class="fas ${order.status==='preparing'?'fa-fire':'fa-check-circle'}"></i> ${order.status==='preparing'?'قيد التحضير':'مكتمل'}</span>
                                ${order.notes ? `<div><i class="fas fa-sticky-note"></i> ${order.notes}</div>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                }
            };

            // ---------- إدارة التقارير ----------
            const ReportsManager = {
                currentPreset: 'today',

                setPreset(preset, event) {
                    if (event) {
                        document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
                        event.target.classList.add('active');
                    }
                    this.currentPreset = preset;
                    const today = new Date();
                    let start, end;
                    switch (preset) {
                        case 'today':
                            start = new Date(today.setHours(0,0,0,0));
                            end = new Date(today.setHours(23,59,59,999));
                            break;
                        case 'yesterday':
                            const y = new Date(today); y.setDate(y.getDate()-1);
                            start = new Date(y.setHours(0,0,0,0));
                            end = new Date(y.setHours(23,59,59,999));
                            break;
                        case 'week':
                            const fd = new Date(today);
                            fd.setDate(today.getDate() - today.getDay() + (today.getDay()===0?-6:1));
                            start = new Date(fd.setHours(0,0,0,0));
                            end = new Date(new Date().setHours(23,59,59,999));
                            break;
                        case 'month':
                            start = new Date(today.getFullYear(), today.getMonth(), 1, 0,0,0);
                            end = new Date(today.getFullYear(), today.getMonth()+1, 0, 23,59,59);
                            break;
                        case 'year':
                            start = new Date(today.getFullYear(), 0, 1, 0,0,0);
                            end = new Date(today.getFullYear(), 11, 31, 23,59,59);
                            break;
                        case 'all':
                            start = new Date(2000,0,1);
                            end = new Date(2100,11,31);
                            break;
                    }
                    document.getElementById('startDate').value = start.toISOString().split('T')[0];
                    document.getElementById('endDate').value = end.toISOString().split('T')[0];
                    this.applyRange();
                },

                applyRange() {
                    const startStr = document.getElementById('startDate').value;
                    const endStr = document.getElementById('endDate').value;
                    if (!startStr || !endStr) return Utils.showToast('حدد التاريخ', true);
                    const start = new Date(startStr); start.setHours(0,0,0,0);
                    const end = new Date(endStr); end.setHours(23,59,59,999);
                    const filtered = AppState.allOrders.filter(o => {
                        const d = new Date(o.timestamp);
                        return d >= start && d <= end;
                    });
                    this.render(filtered);
                },

                render(orders) {
                    const completed = orders.filter(o => o.status === 'completed');
                    let totalSales = 0, totalCost = 0;
                    const productMap = new Map();

                    completed.forEach(order => {
                        totalSales += order.total || 0;
                        (order.items || []).forEach(item => {
                            let pid = item.productId;
                            if (!pid) {
                                const prod = AppState.products.find(p => p.name === item.name);
                                pid = prod ? prod.id : item.name;
                            }
                            const qty = item.quantity || 1;
                            const price = item.price || 0;
                            const rev = price * qty;
                            const prodObj = AppState.products.find(p => p.id === pid || p.name === item.name);
                            const cost = prodObj && prodObj.cost ? prodObj.cost * qty : 0;
                            totalCost += cost;

                            if (productMap.has(pid)) {
                                const p = productMap.get(pid);
                                p.qty += qty;
                                p.rev += rev;
                                p.cost += cost;
                            } else {
                                productMap.set(pid, { name: item.name, qty, rev, cost });
                            }
                        });
                    });

                    const totalProfit = totalSales - totalCost;
                    const avgMargin = totalSales > 0 ? (totalProfit / totalSales) * 100 : 0;

                    document.getElementById('totalSales').innerHTML = totalSales.toFixed(2) + ' د.أ';
                    document.getElementById('totalProfit').innerHTML = totalProfit.toFixed(2) + ' د.أ';
                    document.getElementById('totalOrders').innerHTML = completed.length;
                    document.getElementById('avgMargin').innerHTML = avgMargin.toFixed(1) + '%';

                    const topProducts = Array.from(productMap.values()).sort((a,b) => (b.rev - b.cost) - (a.rev - a.cost)).slice(0,20);
                    const tbody = document.querySelector('#topProductsTable tbody');
                    if (tbody) {
                        tbody.innerHTML = topProducts.map(p => {
                            const profit = p.rev - p.cost;
                            const margin = p.rev > 0 ? (profit / p.rev) * 100 : 0;
                            const cls = profit >= 0 ? 'profit-val' : 'loss-val';
                            return `<tr>
                                <td>${p.name}</td>
                                <td>${p.qty}</td>
                                <td>${p.rev.toFixed(2)}</td>
                                <td>${p.cost.toFixed(2)}</td>
                                <td class="${cls}">${profit.toFixed(2)}</td>
                                <td>${margin.toFixed(1)}%</td>
                            </tr>`;
                        }).join('');
                    }

                    this.updateChart(completed);
                },

                updateChart(orders) {
                    const dailyMap = new Map();
                    orders.forEach(o => {
                        const date = new Date(o.timestamp).toLocaleDateString('ar-EG');
                        dailyMap.set(date, (dailyMap.get(date) || 0) + (o.total || 0));
                    });
                    const sorted = Array.from(dailyMap.entries()).sort((a,b) => new Date(a[0]) - new Date(b[0]));
                    const labels = sorted.map(d => d[0]);
                    const data = sorted.map(d => d[1]);

                    const ctx = document.getElementById('salesChart').getContext('2d');
                    if (AppState.salesChart) AppState.salesChart.destroy();
                    AppState.salesChart = new Chart(ctx, {
                        type: 'line',
                        data: { labels, datasets: [{ label: 'المبيعات (د.أ)', data, borderColor: '#2D5A27', backgroundColor: 'rgba(45,90,39,0.1)', tension: 0.3, fill: true }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                    });
                }
            };

            // ---------- إدارة المنيو (الأصناف والمنتجات) ----------

                renderCategories() {

                    const filter = document.getElementById('filterCategory');

                                <button class="delete-btn" onclick="MenuManager.deleteItem('products','${p.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;

                },

                openCategoryModal(item = { id: '', name: '', description: '', image: '', order: 0 }) {
                    AppState.editingItem = item.id ? item : null;
                    document.getElementById('modalTitle').innerText = AppState.editingItem ? 'تعديل صنف' : 'إضافة صنف';
                    document.getElementById('editForm').innerHTML = `
                        <div class="form-group"><label>الاسم</label><input type="text" id="cat_name" value="${item.name}"></div>
                        <div class="form-group"><label>الوصف</label><textarea id="cat_desc">${item.description}</textarea></div>
                        <div class="form-group"><label>رابط الصورة</label><input type="text" id="cat_image" value="${item.image}"></div>
                        <div class="form-group"><label>الترتيب</label><input type="number" id="cat_order" value="${item.order}"></div>
                        <button type="button" class="submit-form-btn" onclick="MenuManager.saveCategory()">حفظ</button>
                    `;
                    document.getElementById('modalOverlay').classList.add('active');
                },

                async saveCategory() {
                    const data = {
                        id: AppState.editingItem ? AppState.editingItem.id : Utils.generateId(),
                        name: document.getElementById('cat_name').value,
                        description: document.getElementById('cat_desc').value,
                        image: document.getElementById('cat_image').value,
                        order: parseInt(document.getElementById('cat_order').value) || 0
                    };
                    if (AppState.editingItem) {
                        const idx = AppState.categories.findIndex(c => c.id === AppState.editingItem.id);
                        AppState.categories[idx] = data;
                    } else {
                        AppState.categories.push(data);
                    }
                    this.renderCategories();
                    App.UI.closeModal();
                    await API.saveToServer('categories', AppState.categories);
                },

                editCategory(item) { this.openCategoryModal(item); },

                openProductModal(item = { id: '', categoryId: '', name: '', description: '', price: 0, cost: 0, image: '', isNew: false, order: 0 }) {
                    AppState.editingItem = item.id ? item : null;
                    document.getElementById('modalTitle').innerText = AppState.editingItem ? 'تعديل منتج' : 'إضافة منتج';
                    const catOptions = AppState.categories.map(c => `<option value="${c.id}" ${c.id === item.categoryId ? 'selected' : ''}>${c.name}</option>`).join('');
                    document.getElementById('editForm').innerHTML = `
                        <div class="form-group"><label>الصنف</label><select id="prod_catId">${catOptions}</select></div>
                        <div class="form-group"><label>الاسم</label><input type="text" id="prod_name" value="${item.name}"></div>
                        <div class="form-group"><label>الوصف</label><textarea id="prod_desc">${item.description}</textarea></div>
                        <div class="form-group"><label>سعر البيع</label><input type="number" step="0.1" id="prod_price" value="${item.price}"></div>
                        <div class="form-group"><label>تكلفة المنتج (للوحدة)</label><input type="number" step="0.1" id="prod_cost" value="${item.cost || 0}"></div>
                        <div class="form-group"><label>رابط الصورة</label><input type="text" id="prod_image" value="${item.image}"></div>
                        <div class="form-group"><label>جديد</label><select id="prod_isNew"><option value="false" ${!item.isNew ? 'selected' : ''}>لا</option><option value="true" ${item.isNew ? 'selected' : ''}>نعم</option></select></div>
                        <div class="form-group"><label>الترتيب</label><input type="number" id="prod_order" value="${item.order}"></div>
                        <button type="button" class="submit-form-btn" onclick="MenuManager.saveProduct()">حفظ</button>
                    `;
                    document.getElementById('modalOverlay').classList.add('active');
                },

                async saveProduct() {
                    const data = {
                        id: AppState.editingItem ? AppState.editingItem.id : Utils.generateId(),
                        categoryId: document.getElementById('prod_catId').value,
                        name: document.getElementById('prod_name').value,
                        description: document.getElementById('prod_desc').value,
                        price: parseFloat(document.getElementById('prod_price').value) || 0,
                        cost: parseFloat(document.getElementById('prod_cost').value) || 0,
                        image: document.getElementById('prod_image').value,
                        isNew: document.getElementById('prod_isNew').value === 'true',
                        order: parseInt(document.getElementById('prod_order').value) || 0
                    };
                    if (AppState.editingItem) {
                        const idx = AppState.products.findIndex(p => p.id === AppState.editingItem.id);
                        AppState.products[idx] = data;
                    } else {
                        AppState.products.push(data);
                        // إضافة للمخزون
                        AppState.inventoryData.push({
                            productId: data.id,
                            openingStock: 0,
                            actualStock: 0,
                            lastCountDate: null
                        });
                        InventoryManager.save();
                    }
                    this.renderProducts();
                    App.UI.closeModal();
                    await API.saveToServer('products', AppState.products);
                },

                editProduct(item) { this.openProductModal(item); },

                async deleteItem(type, id) {
                    if (!confirm('تأكيد الحذف؟')) return;
                    if (type === 'products') {
                        AppState.inventoryData = AppState.inventoryData.filter(i => i.productId !== id);
                        InventoryManager.save();
                    }
                    AppState[type] = AppState[type].filter(item => item.id !== id);
                    if (type === 'categories') this.renderCategories();
                    else this.renderProducts();
                    await API.saveToServer(type, AppState[type]);
                }
            };

            // ---------- واجهة المستخدم والتحكم العام ----------
            const UI = {
                closeModal() {
                    document.getElementById('modalOverlay').classList.remove('active');
                },

                closeInventoryModal() {
                    document.getElementById('inventoryModal').classList.remove('active');
                },

                buildContentArea() {
                    // يتم استدعاؤها عند التبديل بين التبويبات
                },

                switchTab(tab) {
                    AppState.currentTab = tab;
                    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                    // إعادة بناء المحتوى حسب التبويب
                    const content = document.getElementById('contentArea');
                    if (tab === 'categories') {
                        content.innerHTML = `<div class="tab-content active" id="categories"></div>`;
                        MenuManager.renderCategories();
                    } else if (tab === 'products') {
                        content.innerHTML = `
                            <div class="tab-content active" id="products">
                                <select id="filterCategory" class="input-field" style="margin-bottom: 15px;" onchange="MenuManager.renderProducts()"><option value="">جميع الأصناف</option></select>
                                <div id="productsList"></div>
                                <button class="sync-btn" onclick="MenuManager.openProductModal()"><i class="fas fa-plus"></i> إضافة منتج</button>
                            </div>
                        `;
                        // تعبئة خيارات الأصناف
                        const filter = document.getElementById('filterCategory');
                        if (filter) {
                            filter.innerHTML = '<option value="">جميع الأصناف</option>' +
                                AppState.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                        }
                        MenuManager.renderProducts();
                    } else if (tab === 'sales') {
                        content.innerHTML = `
                            <div class="tab-content active" id="sales">
                                <div class="sales-header">
                                    <div class="sales-filter-row">
                                        <select id="salesStatusFilter" class="filter-select" onchange="SalesManager.applyFilter()">
                                            <option value="all">جميع الطلبات</option>
                                            <option value="preparing">قيد التحضير</option>
                                            <option value="completed">مكتملة</option>
                                        </select>
                                        <div class="date-picker">
                                            <label>من:</label> <input type="date" id="salesDateFrom" class="date-input">
                                            <label>إلى:</label> <input type="date" id="salesDateTo" class="date-input">
                                        </div>
                                        <div class="date-preset-buttons">
                                            <button class="date-preset-btn" onclick="SalesManager.setPreset('today')">اليوم</button>
                                            <button class="date-preset-btn" onclick="SalesManager.setPreset('yesterday')">أمس</button>
                                            <button class="date-preset-btn" onclick="SalesManager.setPreset('week')">هذا الأسبوع</button>
                                            <button class="date-preset-btn" onclick="SalesManager.setPreset('month')">هذا الشهر</button>
                                            <button class="date-preset-btn" onclick="SalesManager.setPreset('all')">الكل</button>
                                        </div>
                                        <button class="apply-filter-btn" onclick="SalesManager.applyFilter()"><i class="fas fa-filter"></i> تطبيق</button>
                                        <button class="refresh-sales-btn" onclick="App.refreshSales()"><i class="fas fa-sync-alt"></i></button>
                                        <button class="refresh-sales-btn" onclick="App.syncOrdersFromServer()"><i class="fas fa-cloud-download-alt"></i> مزامنة</button>
                                    </div>
                                </div>
                                <div id="salesList" class="orders-grid"></div>
                            </div>
                        `;
                        SalesManager.initDates();
                        SalesManager.applyFilter();
                    } else if (tab === 'reports') {
                        content.innerHTML = `
                            <div class="tab-content active" id="reports">
                                <div class="reports-header">
                                    <div class="date-range-picker">
                                        <div><label>من:</label> <input type="date" id="startDate" class="date-input"></div>
                                        <div><label>إلى:</label> <input type="date" id="endDate" class="date-input"></div>
                                        <button class="refresh-sales-btn" onclick="ReportsManager.applyRange()"><i class="fas fa-filter"></i> تطبيق</button>
                                    </div>
                                    <div class="preset-buttons">
                                        <button class="preset-btn active" onclick="ReportsManager.setPreset('today', event)">اليوم</button>
                                        <button class="preset-btn" onclick="ReportsManager.setPreset('yesterday', event)">أمس</button>
                                        <button class="preset-btn" onclick="ReportsManager.setPreset('week', event)">هذا الأسبوع</button>
                                        <button class="preset-btn" onclick="ReportsManager.setPreset('month', event)">هذا الشهر</button>
                                        <button class="preset-btn" onclick="ReportsManager.setPreset('year', event)">هذه السنة</button>
                                        <button class="preset-btn" onclick="ReportsManager.setPreset('all', event)">الكل</button>
                                    </div>
                                </div>
                                <div class="stats-cards">
                                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-label">إجمالي المبيعات</div><div class="stat-value" id="totalSales">0 د.أ</div></div>
                                    <div class="stat-card profit-card"><div class="stat-icon"><i class="fas fa-sack-dollar"></i></div><div class="stat-label">صافي الربح الكلي</div><div class="stat-value" id="totalProfit">0 د.أ</div></div>
                                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-receipt"></i></div><div class="stat-label">عدد الطلبات</div><div class="stat-value" id="totalOrders">0</div></div>
                                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-pie"></i></div><div class="stat-label">متوسط نسبة الربح</div><div class="stat-value" id="avgMargin">0%</div></div>
                                </div>
                                <div class="chart-container"><canvas id="salesChart"></canvas></div>
                                <div class="top-products-table">
                                    <h3><i class="fas fa-crown" style="color: var(--clay-brown);"></i> تحليل الأرباح للمنتجات</h3>
                                    <table id="topProductsTable"><thead><tr><th>المنتج</th><th>الكمية</th><th>الإيراد</th><th>التكلفة</th><th>صافي الربح</th><th>هامش الربح</th></tr></thead><tbody></tbody></table>
                                </div>
                            </div>
                        `;
                        ReportsManager.setPreset(ReportsManager.currentPreset);
                    } else if (tab === 'inventory') {
                        content.innerHTML = `
                            <div class="tab-content active" id="inventory">
                                <div class="inventory-header">
                                    <h2 style="color: var(--forest-green);"><i class="fas fa-boxes"></i> إدارة المخزون</h2>
                                    <div class="inventory-actions">
                                        <button class="action-btn small" onclick="InventoryManager.openCountModal()"><i class="fas fa-pen"></i> تسوية المخزون</button>
                                        <button class="action-btn small" onclick="InventoryManager.resetOpeningStock()"><i class="fas fa-undo-alt"></i> إعادة تعيين الافتتاحي</button>
                                        <button class="action-btn small" onclick="InventoryManager.resetFull()"><i class="fas fa-broom"></i> تصفير المخزون</button>
                                        <button class="action-btn small" onclick="InventoryManager.exportData()"><i class="fas fa-download"></i> تصدير</button>
                                        <button class="action-btn small" onclick="InventoryManager.importData()"><i class="fas fa-upload"></i> استيراد</button>
                                    </div>
                                </div>
                                <div class="inventory-table-container">
                                    <table class="inventory-table">
                                        <thead><tr><th>المنتج</th><th>المباع اليوم</th><th>إجمالي المباع</th><th>المخزون النظري</th><th>المخزون الفعلي</th><th>الفرق</th><th>آخر جرد</th></tr></thead>
                                        <tbody id="inventoryTableBody"></tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                        InventoryManager.renderTable();
                    }

                    // تفعيل التبويب
                    const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.innerText.includes(tab === 'categories' ? 'الأصناف' : tab === 'products' ? 'المنتجات' : tab === 'sales' ? 'المبيعات' : tab === 'reports' ? 'الأرباح' : 'المخزون'));
                    if (activeBtn) activeBtn.classList.add('active');
                }
            };

            // ---------- التطبيق الرئيسي ----------
            window.App = {
                // دوال عامة
                attemptLogin: () => {
                    const u = document.getElementById('username').value;
                    const p = document.getElementById('password').value;
                    if (u === CONFIG.CREDENTIALS.user && p === CONFIG.CREDENTIALS.pass) {
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('postLoginWrapper').style.display = 'flex';
                        document.getElementById('appContainer').classList.add('active');
                        // تحميل البيانات
                        API.fetchMenu().then(() => {
                            InventoryManager.load();
                            API.loadOrders(false);
                            UI.switchTab('categories');
                            // محاولة مزامنة العمليات المؤجلة
                            Utils.processOfflineQueue();
                        });
                    } else {
                        document.getElementById('errorMsg').style.display = 'block';
                    }
                },

                logout: () => {
                    document.getElementById('appContainer').classList.remove('active');
                    document.getElementById('postLoginWrapper').style.display = 'none';
                    document.getElementById('loginScreen').style.display = 'block';
                },

                refreshAllData: () => {
                    API.fetchMenu().then(() => {
                        InventoryManager.mergeWithProducts();
                        InventoryManager.renderTable();
                        API.loadOrders(true);
                    });
                },

                refreshSales: () => {
                    API.loadOrders(false);
                },

                syncOrdersFromServer: () => {
                    if (confirm('سيتم جلب آخر الطلبات من السيرفر وفقدان أي تعديلات محلية. هل تريد المتابعة؟')) {
                        API.loadOrders(true);
                        Utils.showToast('جاري المزامنة...');
                    }
                },

                switchTab: (tab) => UI.switchTab(tab),

                // الكائنات الداخلية (للاستخدام من onclick)
                UI: UI,
                Inventory: InventoryManager,
                Menu: MenuManager,
                Sales: SalesManager,
                Reports: ReportsManager
            };

            // تعريض الكائنات للنطاق العام
            window.MenuManager = MenuManager;
            window.InventoryManager = InventoryManager;
            window.SalesManager = SalesManager;
            window.ReportsManager = ReportsManager;

            // تهيئة الأوراق المتساقطة
            (function createLeaves() {
                const leavesContainer = document.getElementById('fallingLeaves');
                if (!leavesContainer) return;
                for (let i = 0; i < 30; i++) {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    leaf.textContent = ['🌿','🍂','🍃'][Math.floor(Math.random() * 3)];
                    leaf.style.left = Math.random() * 100 + '%';
                    leaf.style.animationDuration = (Math.random() * 10 + 12) + 's';
                    leaf.style.animationDelay = Math.random() * -20 + 's';
                    leavesContainer.appendChild(leaf);
                }
            })();
        })();
    </script>
</body>
</html>
